<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AI Agent</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #343541; color: white; height: 100vh; display: flex; flex-direction: column; }
        #topbar { background: #202123; padding: 14px 20px; font-size: 18px; font-weight: bold; text-align: center; border-bottom: 1px solid #555; color: #19C37D; }
        #chat-box { flex: 1; overflow-y: auto; padding: 30px 20px; display: flex; flex-direction: column; gap: 20px; }
        #welcome { text-align: center; margin-top: 80px; color: #8e8ea0; }
        #welcome h2 { font-size: 28px; color: white; margin-bottom: 10px; }
        .message { display: flex; gap: 14px; max-width: 750px; margin: 0 auto; width: 100%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .user-msg { flex-direction: row-reverse; }
        .avatar { width: 38px; height: 38px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; flex-shrink: 0; }
        .user-avatar { background: #5436DA; }
        .ai-avatar { background: #19C37D; color: #000; }
        .bubble { background: #444654; padding: 14px 18px; border-radius: 10px; line-height: 1.7; font-size: 15px; max-width: 680px; overflow-x: auto; }
        .user-msg .bubble { background: #5436DA; }
        .bubble p { margin-bottom: 10px; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble pre { background: #1e1e2e; border-radius: 8px; padding: 0; margin: 10px 0; overflow: hidden; }
        .code-header { background: #2d2d3f; padding: 6px 14px; font-size: 12px; color: #8e8ea0; display: flex; justify-content: space-between; align-items: center; }
        .copy-btn { background: transparent; border: 1px solid #555; color: #8e8ea0; font-size: 11px; padding: 2px 8px; border-radius: 4px; cursor: pointer; }
        .copy-btn:hover { background: #444; color: white; }
        .bubble pre code { display: block; padding: 14px; font-size: 13px; line-height: 1.6; overflow-x: auto; }
        .bubble code:not(pre code) { background: #2d2d3f; padding: 2px 6px; border-radius: 4px; font-size: 13px; color: #e2e8f0; }
        .bubble table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 14px; }
        .bubble th { background: #2d2d3f; padding: 10px 14px; text-align: left; border: 1px solid #555; color: #19C37D; font-weight: bold; }
        .bubble td { padding: 8px 14px; border: 1px solid #555; color: #e2e8f0; }
        .bubble tr:nth-child(even) { background: #3a3b4a; }
        .bubble tr:hover { background: #4a4b5a; }
        .bubble h1, .bubble h2, .bubble h3 { margin: 12px 0 6px; color: #e2e8f0; }
        .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
        .bubble li { margin: 4px 0; }
        .bubble strong { color: #19C37D; }
        .typing-dots span { display: inline-block; width: 7px; height: 7px; background: #8e8ea0; border-radius: 50%; margin: 0 2px; animation: bounce 1.2s infinite; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
        #input-area { padding: 16px 20px 24px; background: #343541; }
        #input-row { display: flex; gap: 10px; max-width: 750px; margin: 0 auto; background: #40414F; border-radius: 12px; padding: 12px 16px; align-items: flex-end; border: 1px solid #555; transition: border-color 0.2s; }
        #input-row:focus-within { border-color: #19C37D; }
        #user-input { flex: 1; background: transparent; border: none; outline: none; color: white; font-size: 15px; resize: none; max-height: 150px; line-height: 1.5; }
        #user-input::placeholder { color: #8e8ea0; }
        #send-btn { background: #19C37D; border: none; border-radius: 8px; width: 38px; height: 38px; cursor: pointer; color: white; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s; }
        #send-btn:hover { background: #17a86c; }
        #send-btn:disabled { background: #555; cursor: not-allowed; }
        #hint { text-align: center; font-size: 12px; color: #8e8ea0; margin-top: 8px; }
    </style>
</head>
<body>
<div id="topbar">My AI Agent</div>
<div id="chat-box">
    <div id="welcome">
        <h2>How can I help you today?</h2>
        <p>Ask me anything — code, tables, explanations and more!</p>
    </div>
</div>
<div id="input-area">
    <div id="input-row">
        <textarea id="user-input" placeholder="Ask me anything..." rows="1"></textarea>
        <button id="send-btn" onclick="sendMessage()">&#9658;</button>
    </div>
    <p id="hint">Press Enter to send &nbsp;|&nbsp; Shift+Enter for new line</p>
</div>
<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const welcome = document.getElementById('welcome');
    marked.setOptions({ breaks: true, gfm: true });
    const renderer = new marked.Renderer();
    renderer.code = function(code, language) {
        const lang = language || 'plaintext';
        const highlighted = hljs.highlightAuto(typeof code === 'object' ? code.text : code).value;
        return '<pre><div class="code-header"><span>' + lang + '</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><code>' + highlighted + '</code></pre>';
    };
    marked.use({ renderer });
    function copyCode(btn) {
        const code = btn.closest('pre').querySelector('code').innerText;
        navigator.clipboard.writeText(code).then(() => {
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = 'Copy', 2000);
        });
    }
    userInput.addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 150) + 'px';
    });
    userInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    function addMessage(text, isUser) {
        if (welcome) welcome.style.display = 'none';
        const msg = document.createElement('div');
        msg.className = 'message' + (isUser ? ' user-msg' : '');
        const avatar = document.createElement('div');
        avatar.className = 'avatar ' + (isUser ? 'user-avatar' : 'ai-avatar');
        avatar.textContent = isUser ? 'You' : 'AI';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        if (isUser) { bubble.textContent = text; } else { bubble.innerHTML = marked.parse(text); }
        msg.appendChild(avatar);
        msg.appendChild(bubble);
        chatBox.appendChild(msg);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
    function addTyping() {
        const msg = document.createElement('div');
        msg.className = 'message';
        msg.id = 'typing-msg';
        const avatar = document.createElement('div');
        avatar.className = 'avatar ai-avatar';
        avatar.textContent = 'AI';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
        msg.appendChild(avatar);
        msg.appendChild(bubble);
        chatBox.appendChild(msg);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
    async function sendMessage() {
        const question = userInput.value.trim();
        if (!question) return;
        userInput.value = '';
        userInput.style.height = 'auto';
        sendBtn.disabled = true;
        addMessage(question, true);
        addTyping();
        try {
            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: question })
            });
            const data = await response.json();
            document.getElementById('typing-msg').remove();
            addMessage(data.answer, false);
        } catch (error) {
            document.getElementById('typing-msg').remove();
            addMessage('Error: Make sure the server is running!', false);
        }
        sendBtn.disabled = false;
        userInput.focus();
    }
</script>
</body>
</html>
